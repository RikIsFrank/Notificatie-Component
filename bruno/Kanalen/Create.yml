info:
  name: Create
  type: http
  seq: 2

http:
  method: POST
  url: "{{ROOT_URI}}/api/{{API_VERSION}}/kanaal"
  body:
    type: json
    data: |-
      {
        "naam": "{{kanaal_naam}}",
        "documentatieLink": "http://example.com/docs",
        "filters": ["bronorganisatie", "zaaktype"]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          const uuid = res.body.url.split('/').pop();
          bru.setVar("kanaal_uuid", uuid);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
