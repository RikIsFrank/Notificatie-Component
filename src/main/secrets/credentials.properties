#
# credentials.properties
# Secrets for the Notificatie Component.
# This file is mounted separately (e.g. via Docker secret or Kubernetes
# Secret) and must NOT be committed to source control.
#
# Format: <alias>/<type>=<value>
#   username = the client_id registered in Open Zaak
#   password = the HMAC-SHA256 secret registered in Open Zaak
#
# The alias name must match nc.zgw.autorisaties-api.auth-alias in
# DeploymentSpecifics.properties.

# NC's own identity for calling the Autorisaties Component (AC).
autorisaties-api.jwt/username=notificatie-component
autorisaties-api.jwt/password=super-secret