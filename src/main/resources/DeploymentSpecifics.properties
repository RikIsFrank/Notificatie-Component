#
# In this file, all information is stored that are specific for this instance of the Frank!Framework.
#

instance.name=NotificatieComponent
configurations.names.application=${configurations.names}
# Base URL of the NC API, this value is used in some configs to reference back to the resource in the NC.
nc.api.base-url=http://localhost:8080/api/v1

jdbc.migrator.active=true
jdbc.datasource.default=jdbc/notificatiecomponent
application.security.jwt.allowWeakSecrets=true

# Base URL of the autorisaties API from Open Zaak. Override in .env for Docker (use host.docker.internal).
nc.zgw.autorisaties-api.root-url=http://localhost:8001/autorisaties/api/v1

# Auth alias for the NC's own JWT - must match credentials.properties.
nc.zgw.autorisaties-api.auth-alias=autorisaties-api.jwt

# JWT lifespan in seconds for incoming tokens.
nc.jwt.timeout=600
