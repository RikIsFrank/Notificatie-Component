scenario.description = GET /v1/kanaal - missing or invalid auth token (401 Unauthorized)

include = common.properties

adapter.listKanaalAdapter.param1.name = headers
adapter.listKanaalAdapter.param1.value = <headers><header name="Authorization">Bearer invalid-token</header></headers>

# No DB setup needed - auth fails before DB is queried

# Step 1: Trigger the adapter
step1.adapter.listKanaalAdapter.write = scenario09/request.txt

# Step 2-3: Stub returns 401
step2.stub.checkAuth.read = scenario09/authRequest.txt
step3.stub.checkAuth.write = scenario09/authResponse.txt

# Step 4-5: Stub the unauthorizedError pipe (FrankSender replaced by stub4testtool)
step4.stub.unauthorizedError.read = ignore
step5.stub.unauthorizedError.write = scenario09/response.json

# Step 6: Expect 401 response
step6.adapter.listKanaalAdapter.read = scenario09/response.json
